<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:300,400,500,700&display=swap">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="nav-links" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">about</a>
          <a href="{{ '/blog/' | relative_url }}">blog</a>
          <a href="{{ '/assets/data/a100_quick_summary_clean.csv' | relative_url }}">data</a>
        </div>
      </nav>
      <progress class="reading-progress" value="0" max="100" aria-label="Reading progress"></progress>
    </header>

    <main class="page">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>
        &copy; {{ "now" | date: "%Y" }} {{ site.author.name }}.
        Powered by <a href="https://jekyllrb.com/">Jekyll</a> with
        <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
      </p>
    </footer>
    <script>
      const progress = document.querySelector('.reading-progress');
      const updateProgress = () => {
        const scrollable = document.documentElement.scrollHeight - window.innerHeight;
        progress.value = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
      };
      updateProgress();
      document.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
    </script>
  </body>
</html>
