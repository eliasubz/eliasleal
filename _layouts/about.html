<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <div class="social-links" aria-label="Contact links">

          </a>
          <a href="https://www.linkedin.com/in/elias-leal-spohr-731b91333/" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.34V8.98h3.42v1.57h.05a3.75 3.75 0 0 1 3.38-1.86c3.61 0 4.28 2.38 4.28 5.47v6.29h-.02ZM5.32 7.41a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12Zm1.78 13.04H3.54V8.98H7.1v11.47ZM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0Z"/></svg>

        <div class="nav-links" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">about</a>
          <a href="{{ '/blog/' | relative_url }}">blog</a>
        </div>
      </nav>
      <progress class="reading-progress" value="0" max="100" aria-label="Reading progress"></progress>
    </header>

    <main class="page">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>
        &copy; {{ "now" | date: "%Y" }} {{ site.author.name }}.
        Powered by <a href="https://jekyllrb.com/">Jekyll</a> with
        <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
      </p>
    </footer>
    <script>
      const progress = document.querySelector('.reading-progress');
      const updateProgress = () => {
        const scrollable = document.documentElement.scrollHeight - window.innerHeight;
        progress.value = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
      };
      updateProgress();
      document.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
    </script>
  </body>
</html>
