---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="subtitle">{{ page.description }}</p>
    {% endif %}
    <p class="post-meta">
      {% if page.read_time %}{{ page.read_time }} <span>&middot;</span> {% endif %}{{ page.date | date: "%B %-d, %Y" }}
    </p>
    {% if page.category %}
      <p class="post-category">{{ page.category }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
