---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%b %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="subtitle">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
